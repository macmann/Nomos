<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Nomos Clearing Voice Agent' }}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="brand" href="/" aria-label="Nomos dashboard">
        <span class="brand-mark"><img src="https://ycnxtseuegjysdxixcpx.supabase.co/storage/v1/object/public/Public/nomos/White%20Symbol.svg" alt="Nomos logo"></span>
        <span><strong>Nomos</strong><small>Clearing Voice Agent</small></span>
      </a>
      <nav class="nav-list">
        <a href="/">Dashboard</a>
        <a href="/profiles">Profiles</a>
        <a href="/cases">Cases</a>
        <a href="/calls">Calls</a>
        <a href="/settings">Settings</a>
        <a href="/cases/import-fixtures">Import Fixtures</a>
      </nav>
      <form method="post" action="/logout" class="sidebar-footer">
        <button class="button button-ghost" type="submit">Logout</button>
      </form>
    </aside>
    <main class="main-panel">
      <header class="topbar">
        <div class="hero-copy">
          <p class="eyebrow">Operations Console</p>
          <h1>{{ title or 'Nomos Clearing Voice Agent' }}</h1>
        </div>
        <aside class="ticker" aria-label="Live operations metrics">
          <span class="ticker-item"><span class="ticker-label">Clear</span><span class="ticker-value ticker-up">↑ 84.68</span></span>
          <span class="ticker-item"><span class="ticker-label">Drift</span><span class="ticker-value ticker-down">↓ -0.01</span></span>
        </aside>
      </header>
      <section class="content">
        {% if error %}<div class="alert alert-error" role="alert">{{ error }}</div>{% endif %}
        {% if result %}<div class="alert alert-success" role="status">{{ result }}</div>{% endif %}
        {% block content %}{% endblock %}
      </section>
    </main>
  </div>
</body>
</html>
