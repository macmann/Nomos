{% extends 'base.html' %}
{% block content %}
<div class="toolbar"><a class="button button-primary" href="/cases/new">Create Case</a></div>
<form class="filter-form" hx-get="/cases" hx-target="#case-table" hx-indicator="#case-loading">
  <input name="status" placeholder="Status">
  <input name="case_type" placeholder="Case type">
  <input name="process_step" placeholder="Process step">
  <input name="language" placeholder="Language">
  <button type="submit">Filter</button><span id="case-loading" class="muted htmx-indicator">Loading…</span>
</form>
<div id="case-table">{% include 'partials/case_table.html' %}</div>
{% endblock %}
