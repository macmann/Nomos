{% extends 'base.html' %}
{% block content %}
<form method="post" action="/settings" class="stack">
  {% for section, keys in sections.items() %}<section class="card"><h2>{{ section }}</h2><div class="grid grid-2">{% for k in keys %}<label>{{ 'Voice Safe Mode' if k == 'voice_safe_mode' else k|replace('_',' ')|title }}{% if 'template' in k or 'prompt' in k or 'disclosure' in k %}<textarea name="{{ k }}">{{ values.get(k,'') }}</textarea>{% else %}<input name="{{ k }}" value="{{ values.get(k,'') }}">{% endif %}{% if help_text and help_text.get(k) %}<span class="muted">{{ help_text.get(k) }}</span>{% endif %}</label>{% endfor %}</div><div class="toolbar section-spaced"><button class="button-primary" formaction="/settings" type="submit">Save {{ section }}</button><button type="button" hx-post="/settings/test/{{ tests[section] }}" hx-target="#test-{{ tests[section] }}">Test connection</button><span id="test-{{ tests[section] }}" class="alert-inline"></span></div></section>{% endfor %}
</form>
{% endblock %}
