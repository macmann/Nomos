{% extends 'base.html' %}{% block content %}<form method="post" action="/settings" class="space-y-6">{% for section, keys in sections.items() %}<section class="bg-white p-5 rounded shadow"><h2 class="font-bold text-lg mb-3">{{ section }}</h2><div class="grid grid-cols-2 gap-3">{% for k in keys %}<label>{{ 'Voice Safe Mode' if k == 'voice_safe_mode' else k }}{% if 'template' in k or 'prompt' in k or 'disclosure' in k %}<textarea name="{{ k }}" class="border p-2 w-full">{{ values.get(k,'') }}</textarea>{% else %}<input name="{{ k }}" value="{{ values.get(k,'') }}" class="border p-2 w-full">{% endif %}{% if help_text and help_text.get(k) %}<span class="block text-sm text-slate-500 mt-1">{{ help_text.get(k) }}</span>{% endif %}</label>{% endfor %}</div><button formaction="/settings" class="bg-blue-600 text-white px-3 py-2 rounded mt-3">Save</button><button type="button" hx-post="/settings/test/{{ tests[section] }}" hx-target="#test-{{ tests[section] }}" class="border px-3 py-2 rounded mt-3">Test connection</button><span id="test-{{ tests[section] }}"></span></section>{% endfor %}</form>{% endblock %}
