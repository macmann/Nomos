<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · Nomos</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="auth-body">
  <main class="auth-card">
    <a class="brand auth-brand" href="/login" aria-label="Nomos login">
      <span class="brand-mark"><img src="https://ycnxtseuegjysdxixcpx.supabase.co/storage/v1/object/public/Public/nomos/White%20Symbol.svg" alt="Nomos logo"></span>
      <span><strong>Nomos</strong><small>Clearing Voice Agent</small></span>
    </a>
    <h1>Welcome back</h1>
    <p class="muted">Sign in to manage clearing cases, calls, and integrations.</p>
    {% if error %}<div class="alert alert-error" role="alert">{{ error }}</div>{% endif %}
    <form method="post" class="stack">
      <label>Username<input name="username" placeholder="Username" autocomplete="username" required></label>
      <label>Password<input name="password" type="password" placeholder="Password" autocomplete="current-password" required></label>
      <button class="button button-primary button-full" type="submit">Login</button>
    </form>
  </main>
  <div class="signoff" aria-label="Nomos sign-off">Power to you.</div>
</body>
</html>
