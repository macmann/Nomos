<table class="w-full bg-white shadow"><tr class="text-left border-b"><th>ID</th><th>External</th><th>Type</th><th>Step</th><th>Status</th><th>Language</th><th>Actions</th></tr>{% for c in cases %}<tr class="border-b"><td>{{ c.id }}</td><td>{{ c.external_case_id }}</td><td>{{ c.case_type }}</td><td>{{ c.process_step }}</td><td><span class="px-2 py-1 rounded bg-slate-200">{{ c.status }}</span></td><td>{{ c.preferred_language }}</td><td class="space-x-2"><form class="inline" hx-post="/calls/outbound" hx-target="#msg"><input type="hidden" name="case_id" value="{{ c.id }}"><button class="text-blue-700">Start Call</button></form><a href="/cases/{{ c.id }}">View Details</a></td></tr>{% endfor %}</table><div id="msg" class="mt-2"></div>
