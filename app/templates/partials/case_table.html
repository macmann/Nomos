<div class="table-wrap"><table><thead><tr><th>ID</th><th>External</th><th>Type</th><th>Step</th><th>Status</th><th>Language</th><th>Actions</th></tr></thead><tbody>{% for c in cases %}<tr><td>{{ c.id }}</td><td>{{ c.external_case_id or '—' }}</td><td>{{ c.case_type or '—' }}</td><td>{{ c.process_step or '—' }}</td><td><span class="badge badge-{{ c.status or 'pending' }}">{{ c.status or 'pending' }}</span></td><td>{{ c.preferred_language or '—' }}</td><td><form class="inline" hx-post="/calls/outbound" hx-target="#msg" hx-swap="innerHTML"><input type="hidden" name="case_id" value="{{ c.id }}"><button type="submit">Start Call</button></form> <a class="button" href="/cases/{{ c.id }}">View Details</a></td></tr>{% else %}<tr><td colspan="7" class="muted">No cases match the current filters.</td></tr>{% endfor %}</tbody></table></div><div id="msg" class="section-spaced"></div>
